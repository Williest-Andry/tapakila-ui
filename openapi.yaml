      parameters:
        - schema:
            type: string
          required: false
          name: firstName
          in: query
        - schema:
            type: string
          required: false
          name: lastName
          in: query
        - schema:
            type: string
            enum:
              - USER
              - ORGANIZER
              - ADMIN
          required: false
          name: role
          in: query
        - schema:
            type: string
          required: false
          name: isActive
          in: query
        - schema:
            type: integer
            minimum: 1
            default: 1
          required: false
          name: page
          in: query
        - schema:
