openapi: 3.0.0
info:
  title: Tapakila API
  version: 1.0.0
  description: REST API for Tapakila — an event ticketing platform
servers:
  - url: http://localhost:3000
    description: Development
  - url: ""
    description: Production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas: {}
  parameters: {}
paths:
  /auth/login:
    post:
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 1
              required:
                - email
                - password
      responses:
        "200":
          description: Login successful
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /auth/logout:
    post:
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required:
                - refreshToken
      responses:
        "200":
          description: Logout successful
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /auth/register:
    post:
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                  minLength: 1
                lastName:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 8
              required:
                - email
                - firstName
                - lastName
                - password
      responses:
        "201":
          description: Registration successful
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /auth/me:
    get:
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /auth/refresh-tokens:
    post:
      tags:
        - Auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required:
                - refreshToken
      responses:
        "200":
          description: Token refreshed
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /users:
    get:
      tags:
        - Users
      description: Requires ADMIN role.
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
          required: false
          name: firstName
          in: query
        - schema:
            type: string
          required: false
          name: lastName
          in: query
        - schema:
            type: string
            enum:
              - USER
              - ORGANIZER
              - ADMIN
          required: false
          name: role
          in: query
        - schema:
            type: string
          required: false
          name: isActive
          in: query
        - schema:
            type: integer
            minimum: 1
            default: 1
          required: false
          name: page
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: Users retrieved
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
    post:
      tags:
        - Users
      description: Requires ADMIN role.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                  minLength: 1
                lastName:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum:
                    - USER
                    - ORGANIZER
                    - ADMIN
                  default: USER
              required:
                - email
                - firstName
                - lastName
                - password
      responses:
        "201":
          description: User created
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /users/me:
    patch:
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                  minLength: 1
                lastName:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: User profile updated
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /users/me/to-organizer:
    patch:
      tags:
        - Users
      description: Requires USER role.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role changed to ORGANIZER
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /users/{id}:
    get:
      tags:
        - Users
      description: Requires ADMIN role.
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: User found
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
    patch:
      tags:
        - Users
      description: Requires ADMIN role.
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                  minLength: 1
                lastName:
                  type: string
                  minLength: 1
                role:
                  type: string
                  enum:
                    - USER
                    - ORGANIZER
                    - ADMIN
      responses:
        "200":
          description: User updated
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /users/{id}/deactivate:
    patch:
      tags:
        - Users
      description: Requires ADMIN role.
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: User deactivated
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /events:
    get:
      tags:
        - Events
      parameters:
        - schema:
            type: string
          required: false
          name: search
          in: query
        - schema:
            type: string
            format: uuid
          required: false
          name: categoryId
          in: query
        - schema:
            type: string
          required: false
          name: location
          in: query
        - schema:
            type: string
            format: uuid
          required: false
          name: organizerId
          in: query
        - schema:
            type: string
            enum:
              - DRAFT
              - PUBLISHED
              - CANCELLED
          required: false
          name: status
          in: query
        - schema:
            type: string
            nullable: true
            format: date-time
          required: false
          name: dateFrom
          in: query
        - schema:
            type: string
            nullable: true
            format: date-time
          required: false
          name: dateTo
          in: query
        - schema:
            type: number
            nullable: true
            minimum: 0
          required: false
          name: priceMin
          in: query
        - schema:
            type: number
            minimum: 0
            exclusiveMinimum: true
          required: false
          name: priceMax
          in: query
        - schema:
            type: integer
            minimum: 1
            default: 1
          required: false
          name: page
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          required: false
          name: limit
          in: query
        - schema:
            type: string
            enum:
              - eventDate
              - createdAt
              - title
            default: eventDate
          required: false
          name: sortBy
          in: query
        - schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
          required: false
          name: sortOrder
          in: query
      responses:
        "200":
          description: Events retrieved
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
    post:
      tags:
        - Events
      description: Requires ADMIN or ORGANIZER role.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 50
                description:
                  type: string
                  minLength: 1
                location:
                  type: string
                  minLength: 1
                eventDate:
                  type: string
                  nullable: true
                  format: date-time
                imageUrl:
                  type: string
                category:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                  required:
                    - id
              required:
                - title
                - location
                - eventDate
                - category
      responses:
        "201":
          description: Event created
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /events/{id}/status:
    patch:
      tags:
        - Events
      description: Requires ADMIN or ORGANIZER role.
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - DRAFT
                    - PUBLISHED
                    - CANCELLED
              required:
                - status
      responses:
        "200":
          description: Event status updated
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /events/{eventId}/ticket-types:
    get:
      tags:
        - TicketTypes
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: eventId
          in: path
      responses:
        "200":
          description: Ticket types retrieved
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
    post:
      tags:
        - TicketTypes
      description: Requires ADMIN or ORGANIZER role.
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: eventId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                price:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                totalSeats:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                maxPerUser:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                  default: 5
              required:
                - name
                - price
                - totalSeats
      responses:
        "201":
          description: Ticket type created
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /events/{eventId}/ticket-types/{id}:
    patch:
      tags:
        - TicketTypes
      description: Requires ADMIN or ORGANIZER role.
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: eventId
          in: path
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                price:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                totalSeats:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                maxPerUser:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
      responses:
        "200":
          description: Ticket type updated
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /events/{eventId}/ticket-types/{id}/deactivate:
    patch:
      tags:
        - TicketTypes
      description: Requires ADMIN or ORGANIZER role.
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: eventId
          in: path
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Ticket type deactivated
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /event-categories:
    get:
      tags:
        - Categories
      responses:
        "200":
          description: Categories retrieved
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
    post:
      tags:
        - Categories
      description: Requires ADMIN role.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 20
              required:
                - name
      responses:
        "201":
          description: Category created
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /event-categories/{id}:
    get:
      tags:
        - Categories
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Category found
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /bookings:
    get:
      tags:
        - Bookings
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: false
          name: eventId
          in: query
        - schema:
            type: string
            enum:
              - CONFIRMED
              - CANCELLED
          required: false
          name: status
          in: query
        - schema:
            type: integer
            minimum: 1
            default: 1
          required: false
          name: page
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: Bookings retrieved
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
    post:
      tags:
        - Bookings
      description: Requires USER or ORGANIZER role.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                eventId:
                  type: string
                  format: uuid
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      ticketTypeId:
                        type: string
                        format: uuid
                      quantity:
                        type: integer
                        minimum: 0
                        exclusiveMinimum: true
                    required:
                      - ticketTypeId
                      - quantity
                  minItems: 1
              required:
                - eventId
                - items
      responses:
        "201":
          description: Booking created
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /bookings/{id}:
    get:
      tags:
        - Bookings
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Booking found
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
    patch:
      tags:
        - Bookings
      description: Requires USER or ORGANIZER role.
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ticketTypeId:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
              required:
                - ticketTypeId
                - quantity
      responses:
        "200":
          description: Booking item updated
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
  /bookings/{id}/cancel:
    patch:
      tags:
        - Bookings
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Booking cancelled
        "400":
          description: Validation error
        "401":
          description: Authentication required
        "403":
          description: Forbidden
        "404":
          description: Resource not found
        "409":
          description: Conflict
        "500":
          description: Internal server error
